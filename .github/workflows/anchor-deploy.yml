name: Anchor Build & Deploy to Devnet

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.30.1
    env:
      RUSTUP_HOME: /root/.rustup
      CARGO_HOME: /root/.cargo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install latest Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Verify toolchain versions
        run: |
          echo "=== Rust ===" && rustc --version && cargo --version
          echo "=== Solana ===" && solana --version
          echo "=== Anchor ===" && anchor --version

      - name: Pin all high-MSRV packages for cargo-build-sbf compatibility
        run: |
          # cargo-build-sbf (inside the Anchor Docker image) uses rustc 1.75.0-dev internally.
          # Any crate whose MSRV exceeds 1.75 must be pinned to an older compatible version.
          # Run ALL pins here so that the final lockfile downgrade (v4->v3) is the last mutation.

          pin_if_needed() {
            local PKG="$1" TARGET="$2"
            local CUR=$(grep -A1 "name = \"$PKG\"" Cargo.lock | grep -oP 'version = "\K[^"]+' | head -1)
            if [ -n "$CUR" ] && [ "$CUR" != "$TARGET" ]; then
              echo "Pinning $PKG from $CUR to $TARGET"
              cargo update "$PKG@$CUR" --precise "$TARGET" || true
            else
              echo "$PKG already at $TARGET (or not in lockfile), skipping"
            fi
          }

          # borsh >=1.6.0 requires rustc 1.77+
          BORSH_VER=$(grep -A1 'name = "borsh"' Cargo.lock | grep -oP 'version = "1\.\K[^"]+' | head -1)
          if [ -n "$BORSH_VER" ] && [ "1.$BORSH_VER" != "1.5.7" ]; then
            echo "Pinning borsh from 1.$BORSH_VER to 1.5.7"
            cargo update "borsh@1.$BORSH_VER" --precise 1.5.7 || true
          fi

          # toml_edit >=0.23.0 pulls in toml_datetime v0.7.x+spec (MSRV 1.76).
          # The 0.22.x series uses toml_datetime 0.6.x (MSRV 1.65) — safe for rustc 1.75.
          TOML_VER=$(grep -A1 'name = "toml_edit"' Cargo.lock | grep -oP 'version = "\K[^"]+' | head -1)
          if [ -n "$TOML_VER" ] && [ "$TOML_VER" != "0.22.22" ]; then
            echo "Pinning toml_edit from $TOML_VER to 0.22.22"
            cargo update "toml_edit@$TOML_VER" --precise 0.22.22 || true
          fi

          # proc-macro-crate >=3.2.0 requires toml_edit 0.23.x; pin to last 0.22-compatible version
          PMC_VER=$(grep -A1 'name = "proc-macro-crate"' Cargo.lock | grep -oP 'version = "\K[^"]+' | head -1)
          if [ -n "$PMC_VER" ] && [ "$PMC_VER" != "3.1.0" ]; then
            echo "Pinning proc-macro-crate from $PMC_VER to 3.1.0"
            cargo update "proc-macro-crate@$PMC_VER" --precise 3.1.0 || true
          fi

          # toml_datetime v0.7.x+spec requires rustc 1.76 — pin to 0.6.8 if it appears
          TDATETIME_VER=$(grep -A1 'name = "toml_datetime"' Cargo.lock | grep -oP 'version = "\K[^"]+' | head -1)
          if [ -n "$TDATETIME_VER" ]; then
            case "$TDATETIME_VER" in
              0.7*)
                echo "Pinning toml_datetime from $TDATETIME_VER to 0.6.8"
                cargo update "toml_datetime@$TDATETIME_VER" --precise 0.6.8 || true
                ;;
            esac
          fi

          # indexmap 2.x requires rustc 1.82 — pin to 1.x series
          IMAP_VER=$(grep -A1 'name = "indexmap"' Cargo.lock | grep -oP 'version = "2\.\K[^"]+' | head -1)
          if [ -n "$IMAP_VER" ]; then
            echo "Pinning indexmap from 2.$IMAP_VER to 1.9.3"
            cargo update "indexmap@2.$IMAP_VER" --precise 1.9.3 || true
          fi

          # hashbrown >=0.15 requires rustc 1.80+
          pin_if_needed "hashbrown" "0.14.5"

          # winnow >=0.7 requires rustc 1.77+
          WINNOW_VER=$(grep -A1 'name = "winnow"' Cargo.lock | grep -oP 'version = "\K[^"]+' | head -1)
          if [ -n "$WINNOW_VER" ]; then
            MAJOR=$(echo "$WINNOW_VER" | cut -d. -f1)
            MINOR=$(echo "$WINNOW_VER" | cut -d. -f2)
            if [ "$MAJOR" -gt 0 ] || [ "$MINOR" -ge 7 ]; then
              echo "Pinning winnow from $WINNOW_VER to 0.6.26"
              cargo update "winnow@$WINNOW_VER" --precise 0.6.26 || true
            fi
          fi

          echo "=== Final key versions ==="
          grep -E 'name = "(borsh|toml_edit|toml_datetime|proc-macro-crate|indexmap|hashbrown|winnow)"' Cargo.lock -A1 | grep version

      - name: Downgrade Cargo.lock to v3 for cargo-build-sbf
        run: |
          # MUST run AFTER all cargo update steps — stable cargo rewrites lockfile as v4.
          # cargo-build-sbf (internal Cargo 1.75-dev) cannot parse v4 lockfiles.
          sed -i 's/^version = 4$/version = 3/' Cargo.lock
          echo "=== Lockfile version ==="
          head -3 Cargo.lock

      - name: Build instinctfi program
        run: anchor build -p instinctfi

      - name: Configure Solana for Devnet
        run: solana config set --url devnet

      - name: Set up deployment wallet
        run: |
          echo '${{ secrets.ANCHOR_WALLET_KEYPAIR }}' > /tmp/deployer-keypair.json
          solana config set --keypair /tmp/deployer-keypair.json
          echo "Wallet address:"
          solana address
          echo "Balance:"
          solana balance || true

      - name: Airdrop SOL if needed
        run: |
          BALANCE=$(solana balance 2>/dev/null | awk '{print $1}' || echo "0")
          if [ "$(echo "$BALANCE < 2" | bc -l 2>/dev/null || echo 1)" -eq 1 ]; then
            echo "Airdropping SOL..."
            solana airdrop 2 || solana airdrop 1 || true
            sleep 5
            solana balance
          fi

      - name: Get Program ID from keypair
        id: program-id
        run: |
          PROGRAM_ID=$(solana-keygen pubkey target/deploy/instinctfi-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_OUTPUT
          echo "🚀 Program ID: $PROGRAM_ID"

      - name: Update declare_id in Rust source
        run: |
          sed -i "s/declare_id!(\"Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS\")/declare_id!(\"${{ steps.program-id.outputs.PROGRAM_ID }}\")/" programs/instinctfi/src/lib.rs
          grep declare_id programs/instinctfi/src/lib.rs

      - name: Update Anchor.toml
        run: |
          sed -i "s/instinctfi = \"Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS\"/instinctfi = \"${{ steps.program-id.outputs.PROGRAM_ID }}\"/g" Anchor.toml
          grep instinctfi Anchor.toml

      - name: Rebuild with real Program ID
        run: anchor build -p instinctfi

      - name: Deploy to Devnet
        run: anchor deploy -p instinctfi --provider.cluster devnet

      - name: Verify deployment
        run: solana program show ${{ steps.program-id.outputs.PROGRAM_ID }} --url devnet

      - name: Print Program ID
        run: |
          echo "============================================"
          echo "✅ DEPLOYED PROGRAM ID:"
          echo "${{ steps.program-id.outputs.PROGRAM_ID }}"
          echo "============================================"
