name: Anchor Build & Deploy to Devnet

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.30.1
    env:
      RUSTUP_HOME: /root/.rustup
      CARGO_HOME: /root/.cargo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Rust toolchain
        run: |
          export PATH="/root/.cargo/bin:$PATH"
          # Docker image pins stable at 1.79 which can't handle edition2024
          # Need 1.85+ where edition2024 was stabilized
          rustup install 1.85.0
          rustup default 1.85.0
          echo "=== System Rust ===" && rustc --version && cargo --version
          echo "=== Solana ===" && solana --version
          echo "=== Anchor ===" && anchor --version

      - name: Patch platform-tools cargo for edition2024 support
        run: |
          export PATH="/root/.cargo/bin:$PATH"
          # cargo-build-sbf ships Cargo 1.75 inside platform-tools
          # which can't parse edition2024 manifests. Replace it with system Cargo 1.85.
          PLATFORM_TOOLS_CARGO=$(find /root/.local/share/solana/install -name "cargo" -path "*/platform-tools/*/bin/cargo" 2>/dev/null | head -1)
          if [ -n "$PLATFORM_TOOLS_CARGO" ]; then
            SYSTEM_CARGO=$(which cargo)
            echo "Platform-tools cargo: $PLATFORM_TOOLS_CARGO"
            echo "Before: $($PLATFORM_TOOLS_CARGO --version 2>/dev/null || echo 'unable to check')"
            cp "$SYSTEM_CARGO" "$PLATFORM_TOOLS_CARGO"
            echo "After: $($PLATFORM_TOOLS_CARGO --version)"
          else
            echo "WARNING: Could not find platform-tools cargo binary"
            find /root/.local/share/solana/install -name "cargo" 2>/dev/null || echo "No cargo binaries found in solana install"
          fi

      - name: Generate Cargo.lock
        run: |
          export PATH="/root/.cargo/bin:$PATH"
          rm -f Cargo.lock
          cargo generate-lockfile
          
          # Downgrade lockfile v4 -> v3 (cargo-build-sbf reads lockfile with its internal Cargo)
          python3 -c "
          with open('Cargo.lock', 'r') as f:
              content = f.read()
          content = content.replace('version = 4', 'version = 3', 1)
          with open('Cargo.lock', 'w') as f:
              f.write(content)
          "
          echo "=== Lockfile version ==="
          head -3 Cargo.lock

      - name: Build instinctfi program
        run: |
          export PATH="/root/.cargo/bin:$PATH"
          anchor build -p instinctfi

      - name: Configure Solana for Devnet
        run: solana config set --url devnet

      - name: Set up deployment wallet
        run: |
          echo '${{ secrets.ANCHOR_WALLET_KEYPAIR }}' > /tmp/deployer-keypair.json
          solana config set --keypair /tmp/deployer-keypair.json
          echo "Wallet address:"
          solana address
          echo "Balance:"
          solana balance || true

      - name: Airdrop SOL if needed
        run: |
          BALANCE=$(solana balance 2>/dev/null | awk '{print $1}' || echo "0")
          if [ "$(echo "$BALANCE < 2" | bc -l 2>/dev/null || echo 1)" -eq 1 ]; then
            echo "Airdropping SOL..."
            solana airdrop 2 || solana airdrop 1 || true
            sleep 5
            solana balance
          fi

      - name: Get Program ID from keypair
        id: program-id
        run: |
          PROGRAM_ID=$(solana-keygen pubkey target/deploy/instinctfi-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_OUTPUT
          echo "🚀 Program ID: $PROGRAM_ID"

      - name: Update declare_id in Rust source
        run: |
          sed -i "s/declare_id!(\"Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS\")/declare_id!(\"${{ steps.program-id.outputs.PROGRAM_ID }}\")/" programs/instinctfi/src/lib.rs
          grep declare_id programs/instinctfi/src/lib.rs

      - name: Update Anchor.toml
        run: |
          sed -i "s/instinctfi = \"Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS\"/instinctfi = \"${{ steps.program-id.outputs.PROGRAM_ID }}\"/g" Anchor.toml
          grep instinctfi Anchor.toml

      - name: Rebuild with real Program ID
        run: anchor build -p instinctfi

      - name: Deploy to Devnet
        run: anchor deploy -p instinctfi --provider.cluster devnet

      - name: Verify deployment
        run: solana program show ${{ steps.program-id.outputs.PROGRAM_ID }} --url devnet

      - name: Print Program ID
        run: |
          echo "============================================"
          echo "✅ DEPLOYED PROGRAM ID:"
          echo "${{ steps.program-id.outputs.PROGRAM_ID }}"
          echo "============================================"
